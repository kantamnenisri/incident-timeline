<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Timeline Reconstructor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .severity-ERROR, .severity-CRITICAL { background-color: #fee2e2; color: #991b1b; }
        .severity-WARN { background-color: #fef9c3; color: #854d0e; }
        .severity-INFO { background-color: #dbeafe; color: #1e40af; }
        .severity-GAP { background-color: #f3f4f6; color: #374151; font-style: italic; border-top: 2px dashed #d1d5db; border-bottom: 2px dashed #d1d5db; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">Incident Timeline Reconstructor</h1>
            <p class="text-slate-600">Paste your raw logs below to reconstruct the incident timeline.</p>
        </header>

        <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6 mb-8">
            <label class="block text-sm font-medium text-slate-700 mb-2">Raw Log Text</label>
            <textarea id="logInput" class="w-full h-64 p-4 font-mono text-sm border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500 mb-4" placeholder="2024-03-11 10:00:00 INFO starting service...
2024-03-11 10:05:01 ERROR connection refused to postgres..."></textarea>
            
            <div class="flex gap-4">
                <button onclick="reconstruct()" id="btnReconstruct" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors">
                    Reconstruct Timeline
                </button>
                <button onclick="exportReport()" id="btnExport" class="hidden border border-slate-300 hover:bg-slate-50 text-slate-700 px-6 py-2 rounded-md font-medium transition-colors">
                    Export as HTML Report
                </button>
            </div>
        </div>

        <div id="results" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-semibold text-slate-800">Reconstructed Timeline</h2>
                <div id="summary" class="flex gap-4">
                    <!-- Summary badges here -->
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-lg shadow-sm border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-bottom border-slate-200">
                        <tr>
                            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Timestamp</th>
                            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase w-24">Severity</th>
                            <th class="px-6 py-3 text-xs font-semibold text-slate-500 uppercase">Message</th>
                        </tr>
                    </thead>
                    <tbody id="timelineBody" class="divide-y divide-slate-200">
                        <!-- Timeline rows here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function reconstruct() {
            const rawText = document.getElementById('logInput').value;
            if (!rawText.trim()) return alert("Please paste some logs first.");

            const btn = document.getElementById('btnReconstruct');
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const response = await fetch('/reconstruct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_text: rawText })
                });

                if (!response.ok) throw new Error("Failed to reconstruct timeline.");

                const data = await response.json();
                renderTimeline(data);
            } catch (err) {
                alert(err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Reconstruct Timeline";
            }
        }

        function renderTimeline(data) {
            const results = document.getElementById('results');
            const summary = document.getElementById('summary');
            const tbody = document.getElementById('timelineBody');
            const btnExport = document.getElementById('btnExport');

            results.classList.remove('hidden');
            btnExport.classList.remove('hidden');
            tbody.innerHTML = '';
            
            // Render summary
            summary.innerHTML = `
                <span class="px-3 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-700 border border-slate-200">
                    Category: <span class="text-blue-600 font-bold">${data.root_cause_category}</span>
                </span>
                <span class="px-3 py-1 rounded-full text-sm font-medium bg-slate-100 text-slate-700 border border-slate-200">
                    Gaps Detected: <span class="text-orange-600 font-bold">${data.total_gaps}</span>
                </span>
            `;

            // Render table rows
            data.timeline.forEach(event => {
                const row = document.createElement('tr');
                row.className = `severity-${event.severity}`;
                
                const ts = new Date(event.timestamp).toLocaleString();
                
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-mono">${ts}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-xs font-bold uppercase">${event.severity}</td>
                    <td class="px-6 py-4 text-sm">${event.message}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function exportReport() {
            const resultsHtml = document.getElementById('results').innerHTML;
            const fullHtml = `
<!DOCTYPE html>
<html>
<head>
    <title>Incident Timeline Report</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        .severity-ERROR, .severity-CRITICAL { background-color: #fee2e2; color: #991b1b; }
        .severity-WARN { background-color: #fef9c3; color: #854d0e; }
        .severity-INFO { background-color: #dbeafe; color: #1e40af; }
        .severity-GAP { background-color: #f3f4f6; color: #374151; font-style: italic; border-top: 2px dashed #d1d5db; border-bottom: 2px dashed #d1d5db; }
    </style>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Incident Timeline Report</h1>
        ${resultsHtml}
    </div>
</body>
</html>`;

            const blob = new Blob([fullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `incident-report-${new Date().getTime()}.html`;
            a.click();
        }

        // Add some sample logs by default
        document.getElementById('logInput').value = `2024-03-11 10:00:00 INFO [system] Application starting up...
2024-03-11 10:00:05 INFO [db] Connecting to postgres://localhost:5432
2024-03-11 10:00:10 WARN [config] Missing optional env variable REDIS_URL
2024-03-11 10:10:00 ERROR [db] Connection timeout: postgres is unreachable
2024-03-11 10:10:05 CRITICAL [app] Fatal crash: unable to connect to essential services
2024-03-11 10:15:00 INFO [deploy] Rebooting service (version 1.2.3)`;
    </script>
</body>
</html>
